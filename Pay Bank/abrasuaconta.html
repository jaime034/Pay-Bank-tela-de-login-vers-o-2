<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abra sua conta</title>
    <link rel="stylesheet" href="abrasuaconta.css">
</head>
<body>
    <div class="titulo">
        <h2>Abra sua conta gratis</h2>
        <p>Abra sua conta já e descubra um mundo de inovações</p>
    </div>
    
    <section>
        <form action="" class="abra-conta">
            <label for="name">Nome:</label>
            <input type="name" placeholder="digite seu nome completo" required>

            <label for="email">Email:</label>
            <input type="email" placeholder="digite seu email" required>

            <label for="password">Senha:</label>
            <input type="password" maxlength="25" placeholder="digite sua senha" required>

            <button id="botao">Enviar</button>
        </form>
    </section>

    <footer>
    <p>© 2026 Banco Digital. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
